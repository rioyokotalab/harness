Host github
	ForwardX11 no
	HostName github.com
	User git

Host tunnel tunnel2
	ControlMaster no
	ControlPath none
	ControlPersist no
	ExitOnForwardFailure yes
	ForwardX11 no

Host aist aist2 home home2 office office2 riken riken2 web
	ForwardX11 no

# Defaults

Host *
	AddKeysToAgent yes
	ConnectTimeout 30
	ControlMaster auto
	ControlPath ~/.ssh/cm-%C
	ControlPersist yes
	ForwardAgent yes
	ForwardX11 yes
	ForwardX11Trusted yes
	HashKnownHosts yes
	ServerAliveCountMax 3
	ServerAliveInterval 15
	UpdateHostKeys yes
