name: Harness CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: harness-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable-phase1:
    name: portable-phase1
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out without persisted credentials
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Record non-secret runner capabilities
        shell: bash
        run: |
          set -euo pipefail
          uname -m
          python3 --version
          cc --version | sed -n '1p'
          c++ --version | sed -n '1p'
          shellcheck --version | sed -n '2p'
      - name: Run ShellCheck warning gate
        run: |
          set -euo pipefail
          git grep -Il -z '^#!.*\(sh\|bash\)' -- . \
            ':(exclude)tests/fixtures/**' |
            xargs -0 shellcheck --severity=warning
      - name: Test Restic scheduling
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: tests/test-restic-schedule.sh
      - name: Test mirrored-node onboarding
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: tests/test-onboard-mirrored-node.sh
      - name: Test evaluation harness
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: tests/test-evaluation.sh
      - name: Test redacted public-history audit
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: tests/test-public-repo-audit.sh
      - name: Test guarded bulk deletion
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: tests/test-guarded-delete.sh
      - name: Run credential-free portable phase-one gate
        env:
          HARNESS_PORTABLE_CI: "1"
          PYTHONDONTWRITEBYTECODE: "1"
        run: tests/test-phase1.sh
